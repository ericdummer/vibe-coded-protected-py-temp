name: pip-audit

on:
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit (Markdown)
        id: audit
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt --format markdown --output pip-audit.md || true

      - name: Ensure report exists
        if: always()
        run: |
          if [ ! -s pip-audit.md ]; then
            {
              echo "### pip-audit results"
              echo
              echo "No vulnerabilities were reported or no report was generated."
            } > pip-audit.md
          fi

      - name: Add result to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pip-audit-report -->';
            const reportPath = 'pip-audit.md';
            const reportMarkdown = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : 'pip-audit report unavailable.';
            const body = `${marker}\n${reportMarkdown}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail on vulnerabilities
        if: always()
        run: |
          AUDIT_OUTCOME='${{ steps.audit.outcome }}'
          echo "pip-audit step outcome: ${AUDIT_OUTCOME}"
          if [ "${AUDIT_OUTCOME}" = "failure" ]; then
            echo "Failing workflow due to vulnerabilities reported by pip-audit."
            exit 1
          fi
